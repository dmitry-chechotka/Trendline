<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trendline Login</title>
    <link
      rel="icon"
      type="image/png"
      href="/assets/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Trendline" />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page">
    <div class="login-page-shell">
      <div class="login-card">
        <div class="login-branding">
          <h1>Trendline</h1>
          <p>Precision weight analysis for optimal progress</p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="control-group">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              placeholder="Email"
              autocomplete="email"
              required
            />
          </div>

          <div class="control-group">
            <label for="password">Password</label>
            <input
              id="password"
              type="password"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
            <div class="error-message" id="errorMessage"></div>
          </div>

          <button type="submit" class="primary">Log in</button>
          <button type="button" class="link-button">Forgot password?</button>
        </form>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
