<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trendline Registration</title>
    <link
      rel="icon"
      type="image/png"
      href="/assets/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Trendline" />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="register-page">
    <div class="register-page-shell">
      <div class="register-card">
        <div class="register-branding">
          <img
            src="assets/Trendline_Logo_No_Background.png"
            alt="Trendline logo"
            class="brand-logo"
          />
          <p>Precision weight analysis for optimal progress</p>
        </div>

        <form id="registrationForm" class="register-form">
          <div class="control-group">
            <label for="username">Username</label>
            <input
              id="username"
              type="text"
              placeholder="Username"
              autocomplete="name"
              required
            />
          </div>

          <div class="control-group">
            <label for="registerEmail">Email</label>
            <input
              id="registerEmail"
              type="email"
              placeholder="Email"
              autocomplete="email"
              required
            />
          </div>

          <div class="control-group">
            <label for="registerPassword">Password</label>
            <input
              id="registerPassword"
              type="password"
              placeholder="Password"
              autocomplete="new-password"
              required
            />
            <div class="error-message" id="registerErrorMessage"></div>
          </div>

          <div class="action-group">
            <button type="submit" class="primary">Create an account</button>
            <button type="button" class="secondary" id="returnButton">
              Return
            </button>
          </div>
        </form>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
